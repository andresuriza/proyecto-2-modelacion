<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LinProd{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block head %}{% endblock %}
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="navbar-logo">YONI</div>
        <div class="navbar-tiempo">
            <div class="tiempo-bar">
                <span class="tiempo-label">Tiempo</span>
                <div class="tiempo-fill" id="tiempo-fill" style="width: 0%"></div>
            </div>
            <span class="tiempo-valor" id="tiempo-valor">t = 0</span>
            <button class="btn-pausa" id="btn-pausa" title="Pausar" disabled>
                <span class="pausa-icon">&#9654;</span>
            </button>
        </div>
        <ul class="navbar-links">
            <li><a href="/"             {% if request.endpoint == 'home'         %}class="active"{% endif %}>Home</a></li>
            <li><a href="/procesos"     {% if request.endpoint == 'procesos'     %}class="active"{% endif %}>Procesos</a></li>
            <li><a href="/estadisticas" {% if request.endpoint == 'estadisticas' %}class="active"{% endif %}>Estadísticas</a></li>
        </ul>
    </nav>

    {% block content %}{% endblock %}

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
