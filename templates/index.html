<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinProd</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="navbar-logo">YONI</div>
        <div class="navbar-tiempo">
            <div class="tiempo-bar">
                <span class="tiempo-label">Tiempo</span>
                <div class="tiempo-fill" id="tiempo-fill" style="width: 0%"></div>
            </div>
            <span class="tiempo-valor" id="tiempo-valor">t = 0</span>
        </div>
        <ul class="navbar-links">
            <li><a href="/" class="active">Home</a></li>
            <li><a href="/procesos">Procesos</a></li>
            <li><a href="/estadisticas">Estadísticas</a></li>
        </ul>
    </nav>

    <!-- HERO -->
    <section class="hero hero-home">
        <div class="hero-text">
            <h1>Home</h1>
        </div>
    </section>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="main-content">

        <div class="card">
            <form id="form-proceso">
                <div class="form-group">
                    <label>Nombre del proceso</label>
                    <input type="text" id="nombre-proceso" placeholder="" required>
                </div>
                <div class="form-group">
                    <label>Cantidad de producto</label>
                    <input type="number" id="cantidad-producto" min="1" placeholder="" required>
                </div>
                <div class="form-group">
                    <label>Cantidad de tareas</label>
                    <input type="number" id="cantidad-tareas" min="1" placeholder="" required>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-crear">Crear</button>
                </div>
            </form>
        </div>

    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
