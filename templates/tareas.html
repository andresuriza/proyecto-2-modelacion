<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinProd – Mis tareas</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="navbar-logo">YONI</div>
        <div class="navbar-tiempo">
            <div class="tiempo-bar">
                <span class="tiempo-label">Tiempo</span>
                <div class="tiempo-fill" id="tiempo-fill" style="width: 0%"></div>
            </div>
            <span class="tiempo-valor" id="tiempo-valor">t = 0</span>
        </div>
        <ul class="navbar-links">
            <li><a href="/">Home</a></li>
            <li><a href="/procesos">Procesos</a></li>
            <li><a href="/estadisticas">Estadísticas</a></li>
        </ul>
    </nav>

    <!-- HERO -->
    <section class="hero hero-tareas">
        <div class="hero-text">
            <h1>Mis tareas</h1>
        </div>
    </section>

    <!-- CONTENIDO -->
    <main class="main-content">
        <div class="card tareas-card">
            <div id="tareas-lista"></div>

            <div class="form-actions" style="margin-top:1.5rem; gap:1rem;">
                <button class="btn-crear" id="btn-guardar">Guardar proceso</button>
                <button class="btn-crear btn-outline" id="btn-volver" onclick="window.location='/'">Volver</button>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <script src="{{ url_for('static', filename='js/tareas.js') }}"></script>
</body>
</html>
